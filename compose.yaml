services:
  blackone:
    build: .
    container_name: blackone
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Black One}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
    volumes:
      - ./storage:/app/storage
